services:
  redis:
    image: redis:7-alpine
    container_name: ratelimit_redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      # Host 6380 → container 6379, so this never clashes with a local Redis.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
